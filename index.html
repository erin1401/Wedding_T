<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Undangan Pernikahan</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Montserrat', sans-serif;
background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
color:white;
}

.font-display{
font-family:'Cormorant Garamond',serif;
}

.btn-gold{
background:linear-gradient(135deg,#d4af37,#e8c96b);
color:#1a1a2e;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(212,175,55,0.3);
}

</style>

</head>

<body>

<!-- COVER -->

<section id="cover" class="h-screen flex items-center justify-center text-center">

<div>

<p class="tracking-widest text-sm text-amber-300 mb-4">
THE WEDDING OF
</p>

<h1 class="font-display text-5xl text-amber-400">
Nur
</h1>

<p class="text-amber-200 my-2">&</p>

<h1 class="font-display text-5xl text-amber-400">
Erfan
</h1>

<p class="mt-8 text-sm text-amber-200">
Kepada Yth.
</p>

<h2 id="guest-name-display" class="text-xl mt-2">
Tamu Undangan
</h2>

<button
id="open-btn"
class="btn-gold mt-8 px-6 py-3 rounded-full">

Buka Undangan

</button>

</div>

</section>


<!-- CONTENT -->

<div id="content" class="hidden">


<!-- HERO -->

<section class="py-24 text-center">

<h2 class="font-display text-4xl text-amber-400 mb-6">
Nur Indrayakni
</h2>

<p class="text-amber-300 text-xl mb-6">&</p>

<h2 class="font-display text-4xl text-amber-400">
Muhammad Erfan
</h2>

</section>


<!-- EVENT -->

<section class="py-20">

<div class="max-w-3xl mx-auto grid md:grid-cols-2 gap-6 px-6">

<div class="card p-6 text-center rounded-xl">

<h3 class="font-display text-2xl text-amber-400 mb-3">
Akad
</h3>

<p>Sabtu, 4 April 2026</p>

<p>08:00 WIB</p>

</div>

<div class="card p-6 text-center rounded-xl">

<h3 class="font-display text-2xl text-amber-400 mb-3">
Resepsi
</h3>

<p>Sabtu, 4 April 2026</p>

<p>11:00 WIB</p>

</div>

</div>

</section>


<!-- RSVP -->

<section class="py-24">

<div class="max-w-xl mx-auto px-6">

<h2 class="font-display text-3xl text-center text-amber-400 mb-8">
RSVP
</h2>

<div class="card p-8 rounded-xl">

<form id="rsvp-form" class="space-y-4">

<input
type="text"
name="nama"
id="nama"
placeholder="Nama Anda"
required
class="w-full p-3 rounded-lg bg-white/10"
>

<select name="kehadiran" class="w-full p-3 rounded-lg bg-white/10">

<option value="Hadir">Hadir</option>
<option value="Tidak Hadir">Tidak Hadir</option>

</select>

<input
type="number"
name="jumlah"
placeholder="Jumlah Tamu"
class="w-full p-3 rounded-lg bg-white/10"
>

<textarea
name="ucapan"
rows="4"
placeholder="Ucapan & Doa"
class="w-full p-3 rounded-lg bg-white/10"
></textarea>

<button
type="submit"
class="btn-gold w-full py-3 rounded-lg">

Kirim RSVP

</button>

</form>

<p id="status" class="text-center mt-4 text-amber-300"></p>

</div>

</div>

</section>


</div>


<!-- MUSIC -->

<audio id="music" loop>

<source src="music.mp3" type="audio/mp3">

</audio>


<script>


/* ==========================
OPEN INVITATION
========================== */

document
.getElementById("open-btn")
.onclick=function(){

document
.getElementById("cover")
.style.display="none";

document
.getElementById("content")
.classList.remove("hidden");

document
.getElementById("music")
.play();

};



/* ==========================
AUTO NAMA TAMU
========================== */

const urlParams = new URLSearchParams(window.location.search);

const guest = urlParams.get("to");

if(guest){

document.getElementById("guest-name-display").innerText = guest;

document.getElementById("nama").value = guest;

}



/* ==========================
RSVP GOOGLE SHEET
========================== */


const scriptURL="PASTE_URL_GOOGLE_SCRIPT_DISINI";


document
.getElementById("rsvp-form")
.addEventListener("submit",function(e){

e.preventDefault();

const formData=new FormData(this);

const data={
nama:formData.get("nama"),
kehadiran:formData.get("kehadiran"),
jumlah:formData.get("jumlah"),
ucapan:formData.get("ucapan")
};


fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})

.then(res=>res.json())

.then(()=>{

document.getElementById("status").innerHTML=
"Terima kasih RSVP berhasil dikirim 💛";

document.getElementById("rsvp-form").reset();

})

.catch(()=>{

document.getElementById("status").innerHTML=
"Gagal mengirim RSVP";

});

});


</script>


</body>
</html>
